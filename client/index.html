<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rulso — M3 client (ugly but connected)</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }
      body {
        margin: 0;
        padding: 16px;
        background: #0d1117;
        color: #c9d1d9;
      }
      header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #30363d;
        margin-bottom: 12px;
      }
      h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      #status {
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 3px;
      }
      #status[data-state="connecting"] { background: #1f2937; color: #9ca3af; }
      #status[data-state="connected"]  { background: #064e3b; color: #6ee7b7; }
      #status[data-state="closed"]     { background: #4b5563; color: #d1d5db; }
      #status[data-state="error"]      { background: #7f1d1d; color: #fecaca; }
      #seat {
        font-size: 12px;
        color: #8b949e;
      }
      main {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      pre {
        margin: 0;
        padding: 8px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 4px;
        font-size: 12px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Rulso · M3 client</h1>
      <span id="status" data-state="connecting">connecting</span>
      <span id="seat"></span>
    </header>
    <main id="app"></main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
