# Rulso ‚Äî M2 card vocabulary
# Authored by RUL-17 (M1.5 starter) + extended by RUL-31 (M2 content).
# Source-of-truth design contracts:
#   - design/cards-inventory.md      (rule-fragment vocabulary)
#   - design/effects-inventory.md    (revealed-effect catalogue)
#   - design/goals-inventory.md      (goal-card catalogue)
#   - design/status-tokens.md        (status-application matrix)
#   - docs/decisions/ADR-0001..0004  (locked design calls)
#
# Schema (validated by engine/src/rulso/cards.py via Pydantic):
#
#   condition_cards:  # CONDITION templates ‚Äî own a rule's lifetime + slot shape.
#     - id:   <stable engine id, dotted lowercase>
#       name: <render token, bare keyword: IF | WHEN | WHILE>
#       kind: <RuleKind enum: IF | WHEN | WHILE>
#       slots:
#         - { name: <slot label>, type: <CardType: SUBJECT|NOUN|MODIFIER|JOKER> }
#       # NB. CONDITION is not a state.CardType. Conditions live in their own
#       # deck (the dealer's first play each round) and are loaded as
#       # ConditionTemplate, not Card.
#
#   subject_cards:    # SUBJECT cards ‚Äî fill the SUBJECT slot.
#     - { id: <stable id>, name: <render token>, scope_mode?: <singular|existential|iterative> }
#       # name conventions (RUL-18 alignment):
#       #   literal seats:  p0 .. p3          (matches Player.id from rules.start_game)
#       #   labels:         "THE LEADER", "THE WOUNDED"
#       #                   (matches keys in labels.LABEL_NAMES per ADR-0001)
#       #   polymorphic:    ANYONE | EACH_PLAYER
#       # scope_mode defaults to `singular` (ADR-0003); set `existential` for
#       # ANYONE, `iterative` for EACH_PLAYER.
#
#   noun_cards:       # NOUN cards ‚Äî fill the NOUN slot.
#     - { id: <stable id>, name: <render token: CHIPS | VP | CARDS | RULES | HITS | GIFTS | ROUNDS | BURN_TOKENS> }
#
#   modifier_cards:   # MODIFIER comparator cards ‚Äî fill the QUANT slot.
#     - { id: <stable id>, name: "<OP>" | "<OP>:<N>" }
#       # OP in {GE,GT,LE,LT,EQ}; baked-N grandfathered from M1.5; M2 OP-only
#       # cards (per ADR-0002) draw N at play time from dice.
#
#   operator_modifier_cards:  # MODIFIER operator cards ‚Äî attach to filled slots (ADR-0004).
#     - { id: <stable id>, name: <op token>, targets: [<SUBJECT|NOUN|QUANT>...] }
#
#   joker_cards:      # JOKER cards ‚Äî attach to the rule as a whole.
#     - { id: <stable id>, name: "JOKER:<VARIANT>" }
#
#   effect_cards:     # EFFECT cards ‚Äî live in `GameState.effect_deck`; revealed each round.
#     - { id: <stable id>, name: <render token per design/effects-inventory.md> }
#
#   goal_cards:       # Goal cards ‚Äî live in `GameState.goal_deck`; loaded as GoalCard, not Card.
#     - id: <stable id>
#       name: <render token, e.g. THE_BANKER>
#       claim_condition: <snake_case predicate id; registered in goal_predicates.py>
#       vp_award: <int>
#       claim_kind: single | renewable
#
#   deck:             # Physical main-deck composition. Multiplies cards into the main deck.
#     - { id: <subject_/noun_/modifier_/operator_modifier_/joker_ id>, copies: <int > 0> }
#       # CONDITION / EFFECT / goal cards must NOT appear here ‚Äî they live in
#       # separate decks. Effect cards seed `effect_deck` via `load_effect_cards`;
#       # goal cards seed `goal_deck` via `load_goal_cards`.
#
# All card ids must be unique across condition_cards / subject_cards /
# noun_cards / modifier_cards / operator_modifier_cards / joker_cards /
# effect_cards / goal_cards.
# Every `deck` entry id must reference a card from the main-deck-eligible
# sections (subject / noun / modifier / operator_modifier / joker).
#
# RUL-31 NB on `deck:` scope. Phase-2 substrate ships the full M2 vocabulary
# as DATA ‚Äî every card category above is loadable, validated, and ready for
# the Phase-3 engine fan to consume. The `deck:` composition itself is held
# identical to the M1.5 baseline because:
#   * "no behaviour change for M1.5 paths" + "seed 0 produces identical output"
#     (RUL-31 DoD hard constraints). Any deck change reshuffles seed 0.
#   * Most M2 cards would crash the M1.5 engine if drawn: new NOUNs raise in
#     `_evaluate_has`; OP-only comparators raise in `_parse_quant`; operator
#     MODIFIERs land in QUANT and raise the same way. Even silently-safe
#     additions (ANYONE / EACH_PLAYER no-op via empty scope; JOKERs stay
#     in-hand) regress the M1.5 watchable smoke statistically by diluting
#     the rule-fire pool.
# Phase-3 engine tickets (effect dispatcher, ANYONE/EACH scoping, comparator
# dice, operator MODIFIER fold, polymorphic NOUN reads) extend `deck:` for
# their respective additions once each consumer path is wired.

condition_cards:
  - id: cond.if
    name: IF
    kind: IF
    slots:
      - { name: SUBJECT, type: SUBJECT }
      - { name: QUANT, type: MODIFIER }
      - { name: NOUN, type: NOUN }
  - id: cond.when
    name: WHEN
    kind: WHEN
    slots:
      - { name: SUBJECT, type: SUBJECT }
      - { name: QUANT, type: MODIFIER }
      - { name: NOUN, type: NOUN }
  - id: cond.while
    name: WHILE
    kind: WHILE
    slots:
      - { name: SUBJECT, type: SUBJECT }
      - { name: QUANT, type: MODIFIER }
      - { name: NOUN, type: NOUN }

subject_cards:
  # Literal seats ‚Äî match Player.id from rules.start_game.
  - { id: subj.p0, name: p0 }
  - { id: subj.p1, name: p1 }
  - { id: subj.p2, name: p2 }
  - { id: subj.p3, name: p3 }
  # Labels ‚Äî match labels.LABEL_NAMES keys per ADR-0001.
  - { id: subj.leader, name: "THE LEADER" }
  - { id: subj.wounded, name: "THE WOUNDED" }
  # Polymorphic SUBJECTs ‚Äî ADR-0003 scope_mode dispatch.
  - { id: subj.anyone, name: ANYONE, scope_mode: existential }
  - { id: subj.each, name: EACH_PLAYER, scope_mode: iterative }

noun_cards:
  - { id: noun.chips, name: CHIPS }
  - { id: noun.vp, name: VP }
  # M2 NOUNs ‚Äî per design/cards-inventory.md "NOUN ‚Üí M2 nouns".
  - { id: noun.cards, name: CARDS }
  - { id: noun.rules, name: RULES }
  - { id: noun.hits, name: HITS }
  - { id: noun.gifts, name: GIFTS }
  - { id: noun.rounds, name: ROUNDS }
  - { id: noun.burn, name: BURN_TOKENS }

modifier_cards:
  # M1.5 baked-N comparators (grandfathered per ADR-0002):
  # 5 OPs (GE, GT, LE, LT, EQ) √ó thresholds spanning 3, 5, 10, 20.
  # The five inventory-mandated kinds (LT:5, LT:20, GT:10, GE:3, EQ:5) are
  # included; the rest fill out the OP √ó N matrix so 4-bot games have a thick
  # enough comparator pool that hands draw a usable mix.
  - { id: mod.cmp.lt.3, name: "LT:3" }
  - { id: mod.cmp.lt.5, name: "LT:5" }
  - { id: mod.cmp.lt.10, name: "LT:10" }
  - { id: mod.cmp.lt.20, name: "LT:20" }
  - { id: mod.cmp.le.5, name: "LE:5" }
  - { id: mod.cmp.le.20, name: "LE:20" }
  - { id: mod.cmp.gt.3, name: "GT:3" }
  - { id: mod.cmp.gt.10, name: "GT:10" }
  - { id: mod.cmp.ge.3, name: "GE:3" }
  - { id: mod.cmp.ge.5, name: "GE:5" }
  - { id: mod.cmp.ge.10, name: "GE:10" }
  - { id: mod.cmp.eq.5, name: "EQ:5" }
  # M2 OP-only comparators (per ADR-0002): N drawn at play time from 1d6/2d6.
  - { id: mod.cmp.lt, name: "LT" }
  - { id: mod.cmp.le, name: "LE" }
  - { id: mod.cmp.gt, name: "GT" }
  - { id: mod.cmp.ge, name: "GE" }
  - { id: mod.cmp.eq, name: "EQ" }

operator_modifier_cards:
  # M2 operator MODIFIERs ‚Äî attach to filled slots per ADR-0004.
  # `targets` is the set of slot kinds the operator may attach to.
  - { id: mod.op.but, name: BUT, targets: [SUBJECT] }
  - { id: mod.op.and, name: AND, targets: [SUBJECT, NOUN] }
  - { id: mod.op.or, name: OR, targets: [SUBJECT, NOUN] }
  - { id: mod.op.more_than, name: MORE_THAN, targets: [QUANT] }
  - { id: mod.op.at_least, name: AT_LEAST, targets: [QUANT] }

joker_cards:
  # M2 JOKERs ‚Äî rule-level attachment per design/cards-inventory.md "JOKER".
  - { id: jkr.persist_when, name: "JOKER:PERSIST_WHEN" }
  - { id: jkr.persist_while, name: "JOKER:PERSIST_WHILE" }
  - { id: jkr.double, name: "JOKER:DOUBLE" }
  - { id: jkr.echo, name: "JOKER:ECHO" }

effect_cards:
  # M2 starter (14 cards) per design/effects-inventory.md "M2 starter subset"
  # and design/status-tokens.md "M2 starter subset of status-applying cards"
  # (7 status cards covering all 5 tokens + 2 clearing cards). Render names
  # follow `<KIND_TOKEN>[:<MAG>][@<TARGET_MOD>]` ‚Äî dispatcher in
  # engine/src/rulso/effects.py parses on apply.
  #
  # NB. The effect deck is loaded 1:1 from this list (no separate
  # `effect_deck:` block); :func:`rulso.cards.load_effect_cards` yields a
  # tuple in YAML order, and :func:`rulso.rules._draw_effect_card` pops from
  # the end. Reordering this list shifts seed-0 effect reveals ‚Äî keep
  # additions appended at the head (top of YAML) to preserve the established
  # late-round pop sequence for seeded tests.
  #
  # RUL-61: `eff.marked.apply` and `eff.chained.clear` close the
  # design/status-tokens.md "M2 starter subset" gap. Before this addition
  # MARKED was decorative (handler registered in status.py, no card invoked
  # it) and CHAINED was permanent (no clearing card; once chained, goal-locked
  # for the remainder of the game). Both new cards are appended at the head
  # to preserve seed-0 reveal order for the existing 12 cards.
  # Target-modifier choice:
  #   * `APPLY_MARKED` ‚Äî default `all_matched`. Per design/status-tokens.md
  #     "MARKED + non-MARKED + EACH PLAYER rule" MARKED narrows the next
  #     `EACH PLAYER` rule to the marked cohort; marking the matched players
  #     produces the "you've been chosen, the next rule is for you" mechanic.
  #     `EXCEPT_MATCHED` would mark the spared cohort ‚Äî defensible but not
  #     the design's default reading.
  #   * `CLEAR_CHAINED` ‚Äî default `all_matched`. Removes the goal-claim block
  #     from rule-matched players.
  - { id: eff.marked.apply, name: APPLY_MARKED }
  - { id: eff.chained.clear, name: CLEAR_CHAINED }
  - { id: eff.chips.gain.5, name: "GAIN_CHIPS:5" }
  - { id: eff.chips.gain.10, name: "GAIN_CHIPS:10" }
  - { id: eff.chips.drain.5, name: "LOSE_CHIPS:5" }
  - { id: eff.vp.gain.1, name: "GAIN_VP:1" }
  - { id: eff.vp.drain.1, name: "LOSE_VP:1" }
  - { id: eff.burn.apply.1, name: "APPLY_BURN:1" }
  - { id: eff.mute.apply, name: APPLY_MUTE }
  - { id: eff.blessed.apply, name: "APPLY_BLESSED@EXCEPT_MATCHED" }
  - { id: eff.chained.apply, name: APPLY_CHAINED }
  - { id: eff.burn.clear.1, name: "CLEAR_BURN:1" }
  - { id: eff.draw.2, name: "DRAW:2" }
  - { id: eff.noop, name: NOOP }

shop_cards:
  # RUL-56 M2.5 starter pool per ADR-0007 (card-buy semantics via existing
  # `_ShopEntry.payload_type` route). Each `name` matches an identifier the
  # engine already consumes ‚Äî SUBJECT names from `labels.LABEL_NAMES`,
  # MODIFIER names from `rules._OP_ONLY_COMPARATOR_NAMES`, JOKER names from
  # `rules._JOKER_VARIANTS`. Composition: 2 SUBJECT / 2 MODIFIER / 3 JOKER.
  # Pricing band 5-12 (ADR-0007 ¬ß"Pricing rationale"); RUL-56 tuned the
  # gradient within the band against M2 watchable-smoke winner emergence.
  #
  # Tuning journey (full per-config table in docs/engine/m2-smoke.md):
  #   ADR-0007 un-tuned 5/7/6/6/10/9/12      ‚Üí 5/10 winners 1/3/5/7/9 (seed 0 flips)
  #   RUL-56 locked    10/12/11/11/11/11/12  ‚Üí 6/10 winners 0/1/3/5/7/9 (matches pre-SHOP)
  # Mechanism: bots.random.select_purchase is "cheapest affordable, ties by
  # lowest index". Tight 10-12 band keeps every offer rarely affordable in
  # rounds 3/6 after BURN + 5-chip discards, so SHOP fires + is observed
  # without diverting enough chips to flip seeds.
  - { id: shop.subj.wounded, name: "THE WOUNDED", price: 10, payload_type: SUBJECT }
  - { id: shop.subj.leader, name: "THE LEADER", price: 12, payload_type: SUBJECT }
  - { id: shop.mod.gt, name: "GT", price: 11, payload_type: MODIFIER }
  - { id: shop.mod.eq, name: "EQ", price: 11, payload_type: MODIFIER }
  - { id: shop.jkr.double, name: "JOKER:DOUBLE", price: 11, payload_type: JOKER }
  - { id: shop.jkr.echo, name: "JOKER:ECHO", price: 11, payload_type: JOKER }
  - { id: shop.jkr.persist_when, name: "JOKER:PERSIST_WHEN", price: 12, payload_type: JOKER }

goal_cards:
  # M2 starter (7 goals) per design/goals-inventory.md "M2 starter subset".
  # `claim_condition` is a registry key resolved by the Phase-3 goals engine.
  - id: goal.banker
    name: THE_BANKER
    claim_condition: chips_at_least_75
    vp_award: 1
    claim_kind: single
  - id: goal.debtor
    name: THE_DEBTOR
    claim_condition: chips_under_10
    vp_award: 1
    claim_kind: single
  - id: goal.builder
    name: THE_BUILDER
    claim_condition: rules_completed_at_least_3
    vp_award: 1
    claim_kind: single
  - id: goal.philanthropist
    name: THE_PHILANTHROPIST
    claim_condition: gifts_at_least_2
    vp_award: 1
    claim_kind: single
  - id: goal.survivor
    name: THE_SURVIVOR
    claim_condition: burn_at_least_2
    vp_award: 1
    claim_kind: single
  - id: goal.free_agent
    name: THE_FREE_AGENT
    claim_condition: free_agent
    vp_award: 1
    claim_kind: single
  - id: goal.hoarder
    name: THE_HOARDER
    claim_condition: full_hand
    vp_award: 1
    claim_kind: renewable

deck:
  # M1.5 baseline composition ‚Äî held identical so seed 0 produces identical
  # output. M2 cards above are data-only until Phase-3 engine wiring lands.
  # SUBJECT ‚Äî 24 physical (8 kinds √ó 3 copies; +2 polymorphic kinds from RUL-41).
  - { id: subj.p0, copies: 3 }
  - { id: subj.p1, copies: 3 }
  - { id: subj.p2, copies: 3 }
  - { id: subj.p3, copies: 3 }
  - { id: subj.leader, copies: 3 }
  - { id: subj.wounded, copies: 3 }
  # RUL-41: polymorphic SUBJECTs join the live deck ‚Äî 3 copies each, matching
  # the M1.5 SUBJECT cadence; ADR-0003 dispatch lives in effects.resolve_if_rule.
  - { id: subj.anyone, copies: 3 }
  - { id: subj.each, copies: 3 }
  # NOUN ‚Äî 8 physical M1.5 baseline (2 kinds √ó 4 copies) +
  #        12 physical M2 (RUL-44: 6 kinds √ó 2 copies) = 20 physical.
  # M2 copies sized at 2 to mirror RUL-34's worst-case smoke probe ‚Äî enough
  # presence to exercise the Phase-3 NOUN dispatcher without dominating the
  # M1.5 fire-rate distribution.
  - { id: noun.chips, copies: 4 }
  - { id: noun.vp, copies: 4 }
  - { id: noun.cards, copies: 2 }
  - { id: noun.rules, copies: 2 }
  - { id: noun.hits, copies: 2 }
  - { id: noun.gifts, copies: 2 }
  - { id: noun.rounds, copies: 2 }
  - { id: noun.burn, copies: 2 }
  # MODIFIER ‚Äî 24 physical (12 kinds √ó 2 copies, baked-N comparators).
  - { id: mod.cmp.lt.3, copies: 2 }
  - { id: mod.cmp.lt.5, copies: 2 }
  - { id: mod.cmp.lt.10, copies: 2 }
  - { id: mod.cmp.lt.20, copies: 2 }
  - { id: mod.cmp.le.5, copies: 2 }
  - { id: mod.cmp.le.20, copies: 2 }
  - { id: mod.cmp.gt.3, copies: 2 }
  - { id: mod.cmp.gt.10, copies: 2 }
  - { id: mod.cmp.ge.3, copies: 2 }
  - { id: mod.cmp.ge.5, copies: 2 }
  - { id: mod.cmp.ge.10, copies: 2 }
  - { id: mod.cmp.eq.5, copies: 2 }
  # RUL-42 (G): M2 OP-only comparators per ADR-0002 ‚Äî N drawn from dice at play.
  - { id: mod.cmp.lt, copies: 2 }
  - { id: mod.cmp.le, copies: 2 }
  - { id: mod.cmp.gt, copies: 2 }
  - { id: mod.cmp.ge, copies: 2 }
  - { id: mod.cmp.eq, copies: 2 }
  # RUL-43: operator MODIFIERs (ADR-0004) ‚Äî 5 kinds √ó 2 copies = 10 physical.
  # Attached to ``Slot.modifiers``, not ``filled_by``; the bot's play
  # enumeration skips them until ADR-0004's legality extension lands a
  # dedicated "play_operator" action shape.
  - { id: mod.op.but, copies: 2 }
  - { id: mod.op.and, copies: 2 }
  - { id: mod.op.or, copies: 2 }
  - { id: mod.op.more_than, copies: 2 }
  - { id: mod.op.at_least, copies: 2 }
  # RUL-45: JOKERs (M2 Phase 3 J) ‚Äî 4 kinds √ó 2 copies = 8 physical.
  # Sized at 2 to match RUL-34 worst-case watchable-smoke probe (jkr.* each at
  # +2 over baseline). Attach to ``RuleBuilder.joker_attached`` via the
  # dedicated ``play_joker`` action; do not appear in ``Slot.filled_by``.
  - { id: jkr.persist_when, copies: 2 }
  - { id: jkr.persist_while, copies: 2 }
  - { id: jkr.double, copies: 2 }
  - { id: jkr.echo, copies: 2 }
